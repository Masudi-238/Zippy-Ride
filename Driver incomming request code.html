<!DOCTYPE html>

<html class="light" lang="en"><head>

                        "display": ["Plus Jakarta Sans", "sans-serif"]

                    borderRadius: {

                },
            },
        }

<style>body {
    font-family: "Plus Jakarta Sans", sans-serif

.map-bg {

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<!-- Main App Container (Simulating iOS Phone Frame) -->
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[430px] mx-auto shadow-2xl border-x border-slate-200 dark:border-slate-800">
<!-- Full Screen Map Background -->
<div class="absolute inset-0 map-bg z-0" data-alt="City map with driver navigation route" data-location="San Francisco" style=""></div>
<!-- Top Status Overlay -->
<div class="relative z-10 flex items-center justify-between p-6 pt-12 bg-gradient-to-b from-black/20 to-transparent">
<div class="flex items-center gap-2 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md px-3 py-1.5 rounded-full shadow-lg">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="text-xs font-bold tracking-wider uppercase text-slate-800 dark:text-slate-200">Online</span>
</div>
<div class="bg-white/90 dark:bg-background-dark/90 backdrop-blur-md p-2 rounded-full shadow-lg">
<span class="material-symbols-outlined text-slate-800 dark:text-slate-200">person</span>
</div>
</div>
<!-- Central Timer Overlay -->
<div class="relative z-10 flex-1 flex flex-col items-center justify-center -mt-20">
<div class="relative flex items-center justify-center w-48 h-48">
<!-- Outer Glow -->
<div class="absolute inset-0 rounded-full bg-primary/20 blur-xl"></div>
<!-- Progress Ring (Static Simulation) -->
<div class="absolute inset-0 rounded-full border-[6px] border-white/30 dark:border-slate-700/50"></div>
<div class="absolute inset-0 rounded-full border-[6px] border-primary border-t-transparent border-r-transparent rotate-45"></div>
<!-- Inner Content -->
<div class="flex flex-col items-center justify-center bg-white/90 dark:bg-background-dark/95 backdrop-blur-xl w-[160px] h-[160px] rounded-full shadow-2xl border border-white/50 dark:border-slate-700">
<span class="text-5xl font-extrabold text-slate-900 dark:text-white tabular-nums">22</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mt-1">Seconds</span>
</div>
</div>
<div class="mt-8 px-6 py-2 bg-background-dark/80 backdrop-blur-md text-white rounded-full text-sm font-medium border border-white/10">
                New Request: Premier Ride
            </div>
</div>
<!-- Bottom Trip Sheet -->
<div class="relative z-20 mt-auto bg-white dark:bg-background-dark rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.15)] px-6 pb-10 pt-4 border-t border-slate-100 dark:border-slate-800">
<!-- Pull Handle -->
<div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6"></div>
<!-- Fare and Main Info -->
<div class="flex justify-between items-start mb-6">
<div class="flex flex-col">
<span class="text-primary text-sm font-bold uppercase tracking-tight mb-1">Estimated Earnings</span>
<h1 class="text-4xl font-extrabold text-slate-900 dark:text-white leading-none">$18.45</h1>
</div>
<div class="flex flex-col items-end">
<div class="flex items-center gap-1 bg-primary/10 text-primary px-2 py-1 rounded text-xs font-bold mb-2">
<span class="material-symbols-outlined text-xs">bolt</span>
                        1.5x SURGE
                    </div>
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Incl. Tips &amp; Tolls</span>
</div>
</div>
<!-- Trip Metrics Grid -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="flex items-center gap-3 p-4 bg-background-light dark:bg-slate-800/50 rounded-2xl">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-white dark:bg-slate-700 shadow-sm text-primary">
<span class="material-symbols-outlined">near_me</span>
</div>
<div class="flex flex-col">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase">Pickup</span>
<span class="text-slate-900 dark:text-white text-sm font-bold">4 min (1.2 mi)</span>
</div>
</div>
<div class="flex items-center gap-3 p-4 bg-background-light dark:bg-slate-800/50 rounded-2xl">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-white dark:bg-slate-700 shadow-sm text-primary">
<span class="material-symbols-outlined">schedule</span>
</div>
<div class="flex flex-col">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase">Trip</span>
<span class="text-slate-900 dark:text-white text-sm font-bold">15 min (8.2 mi)</span>
</div>
</div>
</div>
<!-- Route Details -->
<div class="space-y-4 mb-8">
<div class="flex gap-4">
<div class="flex flex-col items-center">
<div class="w-3 h-3 rounded-full border-2 border-primary bg-white"></div>
<div class="w-0.5 h-full border-l-2 border-dashed border-slate-300 dark:border-slate-700 my-1"></div>
</div>
<div class="flex-1 pb-4">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium mb-0.5">PICKUP FROM</p>
<p class="text-sm font-bold text-slate-800 dark:text-slate-200">The Ferry Building, Embarcadero</p>
</div>
</div>
<div class="flex gap-4">
<div class="w-3 h-3 rounded bg-slate-800 dark:bg-white mt-1"></div>
<div class="flex-1">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium mb-0.5">DROP OFF TO</p>
<p class="text-sm font-bold text-slate-800 dark:text-slate-200">Mission District, 24th St</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4">
<button class="flex-[1] h-16 rounded-2xl border-2 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold text-lg active:scale-95 transition-transform flex items-center justify-center">
                    Decline
                </button>
<button class="flex-[2.5] h-16 rounded-2xl bg-primary text-slate-900 font-extrabold text-xl shadow-lg shadow-primary/30 active:scale-95 transition-transform flex items-center justify-center gap-2">
                    Accept Request
                    <span class="material-symbols-outlined font-black">arrow_forward</span>
</button>
</div>
</div>
<!-- Floating Map Controls -->
<div class="absolute bottom-[440px] right-6 flex flex-col gap-3 z-10">
<button class="w-12 h-12 rounded-xl bg-white dark:bg-background-dark shadow-xl flex items-center justify-center text-slate-800 dark:text-slate-200">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="w-12 h-12 rounded-xl bg-white dark:bg-background-dark shadow-xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</div>
<!-- Home Indicator (Simulating iOS) -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-900/20 dark:bg-white/20 rounded-full z-[100] pointer-events-none"></div>
