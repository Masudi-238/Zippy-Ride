<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec6d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102218",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Zippy Ride Onboarding</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden max-w-[430px] mx-auto bg-white dark:bg-background-dark shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Zippy Ride</h2>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<!-- Hero Illustration Container -->
<div class="@container w-full max-w-sm">
<div class="relative w-full aspect-square rounded-xl overflow-hidden bg-primary/10 flex items-center justify-center p-8 mb-8" data-alt="Digital wallet with floating green coins over a map with pins">
<!-- Abstract Illustration (Simulated) -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #13ec6d 1px, transparent 0); background-size: 24px 24px;"></div>
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center">
<!-- Map Part -->
<div class="w-4/5 h-1/2 bg-white dark:bg-slate-800 rounded-xl shadow-lg p-3 relative overflow-hidden mb-[-20px] border border-primary/20" data-location="San Francisco" style="">
<div class="w-full h-full bg-slate-100 dark:bg-slate-700 rounded-lg flex flex-col gap-2 p-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">radio_button_checked</span>
<div class="h-1.5 w-16 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">location_on</span>
<div class="h-1.5 w-24 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">location_on</span>
<div class="h-1.5 w-20 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
</div>
<!-- Route Line -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none">
<path d="M40,30 L80,60 L120,40" fill="none" stroke="#13ec6d" stroke-dasharray="4 2" stroke-width="2"></path>
</svg>
</div>
</div>
<!-- Wallet Part -->
<div class="w-1/2 h-2/5 bg-primary rounded-xl shadow-xl flex flex-col items-center justify-center relative transform translate-y-4">
<span class="material-symbols-outlined text-white text-4xl">account_balance_wallet</span>
<div class="absolute -top-4 -right-4 bg-white dark:bg-slate-900 rounded-full p-2 shadow-md">
<span class="material-symbols-outlined text-primary font-bold">add</span>
</div>
<!-- Floating Coins -->
<div class="absolute -top-10 -left-6 bg-primary rounded-full w-8 h-8 flex items-center justify-center border-2 border-white dark:border-slate-900 shadow-lg">
<span class="material-symbols-outlined text-white text-xs">attach_money</span>
</div>
<div class="absolute -bottom-2 -right-10 bg-primary/80 rounded-full w-6 h-6 flex items-center justify-center border-2 border-white dark:border-slate-900 shadow-lg">
<span class="material-symbols-outlined text-white text-[10px]">attach_money</span>
</div>
</div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight pb-3">
                    Smart Wallet &amp; Multi-Stops
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-medium leading-relaxed px-4">
                    Plan complex trips with up to 5 stops effortlessly. Keep your funds ready in the Zippy Wallet for instant, one-tap payments every time you ride.
                </p>
</div>
</div>
<!-- Bottom Navigation Section -->
<div class="p-6 flex flex-col items-center gap-6">
<!-- Progress Indicator -->
<div class="flex flex-row items-center justify-center gap-3">
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
</div>
<!-- Action Buttons -->
<div class="flex w-full gap-4">
<button class="flex-1 h-14 rounded-xl border-2 border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 font-bold text-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    Back
                </button>
<button class="flex-1 h-14 rounded-xl bg-primary text-slate-900 font-bold text-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all">
                    Next
                </button>
</div>
<!-- Safe Area Spacer for iOS -->
<div class="h-4"></div>
</div>
</div>
</body></html>
